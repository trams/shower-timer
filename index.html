<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Shower</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8vw 4vw;
    }

    #display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23vw;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      transition: color 0.4s;
    }

    #display.green { color: #00e040; }
    #display.yellow { color: #e0c000; }
    #display.red { color: #e02000; }

    #sep {
      display: inline-block;
      /* visibility toggled for blink */
    }
    #sep.hidden { visibility: hidden; }

    #btn {
      width: 100%;
      padding: 5vw 0;
      font-size: 9vw;
      font-weight: 700;
      font-family: inherit;
      background: #1a1a1a;
      color: #fff;
      border: 2px solid #444;
      border-radius: 3vw;
      cursor: pointer;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
    }

    #btn:active {
      background: #333;
    }

    /* Settings gear — minimal, bottom-right corner (thumb-reachable); hidden while running */
    #gear {
      position: fixed;
      bottom: 3vw;
      right: 3vw;
      width: 12vw;
      height: 12vw;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7vw;
      line-height: 1;
      color: #555;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }
    #gear:active { color: #999; }
    #gear.hidden { display: none; }

    /* Settings screen */
    #settings {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      justify-content: safe center;
      overflow-y: auto;
      padding: 16vw 8vw 10vw;
      gap: 5vw;
      z-index: 20;
    }
    #settings.open { display: flex; }

    #settings h1 {
      font-size: 8vw;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
      margin-bottom: 2vw;
    }

    /* Back button — top-left of the settings screen */
    #back {
      position: fixed;
      top: 3vw;
      left: 3vw;
      width: 12vw;
      height: 12vw;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9vw;
      line-height: 1;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #back:active { color: #fff; }

    .field { display: flex; flex-direction: column; gap: 2vw; }
    .field label {
      font-size: 5vw;
      color: #aaa;
      letter-spacing: 0.03em;
    }
    .field label .swatch {
      display: inline-block;
      width: 4vw;
      height: 4vw;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 2vw;
    }
    .swatch.green  { background: #00e040; }
    .swatch.yellow { background: #e0c000; }
    .field input {
      font-family: inherit;
      font-size: 8vw;
      font-weight: 700;
      text-align: center;
      background: #1a1a1a;
      color: #fff;
      border: 2px solid #444;
      border-radius: 3vw;
      padding: 3vw 0;
      width: 100%;
    }
    .field input:focus { outline: none; border-color: #888; }

    #settings .note {
      font-size: 4vw;
      color: #666;
      text-align: center;
    }
    #settings .note .swatch {
      display: inline-block;
      width: 3.5vw;
      height: 3.5vw;
      border-radius: 50%;
      vertical-align: middle;
      background: #e02000;
      margin: 0 1vw;
    }

    #err {
      font-size: 4vw;
      color: #e02000;
      text-align: center;
      min-height: 5vw;
    }

    #settings .actions { display: flex; gap: 4vw; margin-top: 2vw; }
    #settings .actions button {
      flex: 1;
      padding: 4vw 0;
      font-size: 6vw;
      font-weight: 700;
      font-family: inherit;
      border-radius: 3vw;
      cursor: pointer;
      letter-spacing: 0.05em;
      -webkit-tap-highlight-color: transparent;
    }
    #save {
      background: #00451a;
      color: #fff;
      border: 2px solid #00803a;
    }
    #save:active { background: #006228; }
    #cancel {
      background: #1a1a1a;
      color: #fff;
      border: 2px solid #444;
    }
    #cancel:active { background: #333; }
  </style>
</head>
<body>

  <button id="gear" aria-label="Settings">&#9881;</button>

  <div id="display" class="green">
    <span id="mm">00</span><span id="sep">:</span><span id="ss">00</span>
  </div>

  <button id="btn">START</button>

  <div id="settings">
    <button id="back" aria-label="Back">&#8592;</button>
    <h1>SETTINGS</h1>

    <div class="field">
      <label for="t1"><span class="swatch green"></span>Green until</label>
      <input id="t1" type="number" inputmode="decimal" min="0" step="0.5">
    </div>

    <div class="field">
      <label for="t2"><span class="swatch yellow"></span>Yellow until</label>
      <input id="t2" type="number" inputmode="decimal" min="0" step="0.5">
    </div>

    <div class="note">minutes &middot; then <span class="swatch"></span>red</div>

    <div id="err"></div>

    <div class="actions">
      <button id="cancel">CANCEL</button>
      <button id="save">SAVE</button>
    </div>
  </div>

  <script>
    const DEFAULT_T1 = 240; // 4 minutes
    const DEFAULT_T2 = 480; // 8 minutes
    const SETTINGS_KEY = 'shower-settings';

    let THRESHOLD1 = DEFAULT_T1;
    let THRESHOLD2 = DEFAULT_T2;

    const display  = document.getElementById('display');
    const mmEl     = document.getElementById('mm');
    const ssEl     = document.getElementById('ss');
    const sepEl    = document.getElementById('sep');
    const btn      = document.getElementById('btn');
    const gear     = document.getElementById('gear');
    const settings = document.getElementById('settings');
    const t1El     = document.getElementById('t1');
    const t2El     = document.getElementById('t2');
    const errEl    = document.getElementById('err');
    const saveBtn  = document.getElementById('save');
    const cancelBtn= document.getElementById('cancel');
    const backBtn  = document.getElementById('back');

    // ---- Settings (persisted in localStorage, stored as seconds) ----
    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        const t1 = Number(s.t1), t2 = Number(s.t2);
        if (Number.isFinite(t1) && Number.isFinite(t2) && t1 > 0 && t1 < t2) {
          THRESHOLD1 = t1;
          THRESHOLD2 = t2;
        }
      } catch (_) { /* corrupt data — keep defaults */ }
    }

    function saveSettings(t1, t2) {
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify({ t1, t2 }));
      } catch (_) { /* storage unavailable — apply for this session only */ }
    }

    function openSettings() {
      t1El.value = THRESHOLD1 / 60;
      t2El.value = THRESHOLD2 / 60;
      errEl.textContent = '';
      settings.classList.add('open');
    }

    function closeSettings() {
      settings.classList.remove('open');
    }

    function applySettings() {
      const t1 = Math.round(parseFloat(t1El.value) * 60);
      const t2 = Math.round(parseFloat(t2El.value) * 60);
      if (!Number.isFinite(t1) || !Number.isFinite(t2) || t1 <= 0 || t2 <= 0) {
        errEl.textContent = 'Enter positive numbers.';
        return;
      }
      if (t1 >= t2) {
        errEl.textContent = 'Green must be less than yellow.';
        return;
      }
      THRESHOLD1 = t1;
      THRESHOLD2 = t2;
      saveSettings(t1, t2);
      closeSettings();
    }

    loadSettings();

    gear.addEventListener('click', openSettings);
    cancelBtn.addEventListener('click', closeSettings);
    backBtn.addEventListener('click', closeSettings);
    saveBtn.addEventListener('click', applySettings);

    let startPerf  = 0;
    let running    = false;
    let ticker     = null;
    let wakeLock   = null;
    let sepVisible = true;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const elapsed = (performance.now() - startPerf) / 1000;

      // blink separator
      sepVisible = !sepVisible;
      sepEl.classList.toggle('hidden', !sepVisible);

      // display: floor seconds to 15s steps
      const mm = Math.floor(elapsed / 60);
      const ss = Math.floor((elapsed % 60) / 15) * 15;
      mmEl.textContent = pad(mm);
      ssEl.textContent = pad(ss);

      // color based on raw elapsed
      if (elapsed <= THRESHOLD1) {
        display.className = 'green';
      } else if (elapsed <= THRESHOLD2) {
        display.className = 'yellow';
      } else {
        display.className = 'red';
      }
    }

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (_) { /* silently ignore in non-secure contexts */ }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        wakeLock.release().catch(() => {});
        wakeLock = null;
      }
    }

    // Re-acquire wake lock when tab becomes visible again (Android releases it on hide)
    document.addEventListener('visibilitychange', () => {
      if (running && document.visibilityState === 'visible') {
        requestWakeLock();
      }
    });

    function start() {
      startPerf  = performance.now();
      running    = true;
      sepVisible = true;
      sepEl.classList.remove('hidden');

      // Reset display immediately
      mmEl.textContent = '00';
      ssEl.textContent = '00';
      display.className = 'green';

      ticker = setInterval(tick, 500);
      btn.textContent = 'STOP';
      gear.classList.add('hidden');

      // Privileged APIs — must be called synchronously in the click handler
      document.documentElement.requestFullscreen().catch(() => {});
      requestWakeLock();
    }

    function stop() {
      running = false;
      clearInterval(ticker);
      ticker = null;
      btn.textContent = 'START';
      sepEl.classList.remove('hidden');
      gear.classList.remove('hidden');
      releaseWakeLock();
    }

    btn.addEventListener('click', () => {
      if (running) stop(); else start();
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
